<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清醒边界 · 反操控训练</title>
    <style>
        :root { --bg: #f9f6f1; --accent: #b4846c; --text: #3e3640; --card-bg: #fff; --shadow: 0 8px 30px rgba(0,0,0,0.06); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f0eb, #ede4db);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .container { max-width: 800px; width: 100%; }
        h1 { text-align: center; font-size: 2.2rem; color: var(--text); margin-bottom: 8px; }
        .subtitle { text-align: center; color: #7a6a5c; margin-bottom: 40px; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 20px; }
        .card {
            background: var(--card-bg); border-radius: 24px; padding: 24px;
            box-shadow: var(--shadow); cursor: pointer; transition: all 0.3s ease;
            border: 2px solid transparent; text-decoration: none; color: inherit;
            position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 14px 36px rgba(0,0,0,0.1); }
        .card .icon { font-size: 2.2rem; margin-bottom: 12px; }
        .card h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }
        .card p { font-size: 0.85rem; color: #777; line-height: 1.4; }
        .card .badge {
            position: absolute; top: 16px; right: 16px;
            background: #f0e2d8; color: var(--accent); font-size: 0.7rem;
            padding: 4px 10px; border-radius: 20px; font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🛡️ 清醒边界</h1>
    <p class="subtitle">选择关卡，开始你的反操控训练</p>
    <div class="grid" id="level-grid"></div>
</div>

<script>
    const levels = [
        { id:1, icon:'💔', title:'煤气灯约会', desc:'亲密关系中的记忆扭曲', badge:'新手' },
        { id:2, icon:'💼', title:'职场 PUA', desc:'以培养为名的压榨', badge:'进阶' },
        { id:3, icon:'🏠', title:'亲情绑架', desc:'来自至亲的情感勒索', badge:'进阶' },
        { id:4, icon:'👯', title:'友情孤立', desc:'三角测量与排挤', badge:'进阶' },
        { id:5, icon:'🩺', title:'权威否定', desc:'医生面前的感受否定', badge:'困难' },
        { id:6, icon:'👤', title:'匿名操控', desc:'网络匿名恶意攻击', badge:'困难' },
        { id:7, icon:'🍻', title:'隐性歧视', desc:'饭桌上的善意优越', badge:'困难' }
    ];

    const grid = document.getElementById('level-grid');
    levels.forEach(l => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = `game.html?level=${l.id}`;
        card.innerHTML = `
            <span class="badge">${l.badge}</span>
            <div class="icon">${l.icon}</div>
            <h3>${l.title}</h3>
            <p>${l.desc}</p>
        `;
        grid.appendChild(card);
    });
</script>
</body>
</html>
